spring.profiles.active=dev
spring.application.name=awesome
server.servlet.context-path=/awesome
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${spring.profiles.active}
management.metrics.web.server.auto-time-requests=true
info.app.name=${spring.application.name}
info.app.description=awesome service template with baseline observability

management.server.port=${APP_PORT:${server.port:8080}}
management.endpoints.web.base-path=/actuator
