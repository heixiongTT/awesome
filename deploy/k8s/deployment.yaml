apiVersion: apps/v1
kind: Deployment
metadata:
  name: awesome-web
  labels:
    app.kubernetes.io/name: awesome-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: awesome-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: awesome-web
    spec:
      containers:
        - name: awesome-web
          image: ghcr.io/example/awesome-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_PORT
              value: "8080"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=25.0"
            - name: ENABLE_SKYWALKING
              value: "false"
          readinessProbe:
            httpGet:
              path: /awesome/actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /awesome/actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /awesome/actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: awesome-web
  labels:
    app.kubernetes.io/name: awesome-web
spec:
  selector:
    app.kubernetes.io/name: awesome-web
  ports:
    - name: http
      port: 80
      targetPort: http
